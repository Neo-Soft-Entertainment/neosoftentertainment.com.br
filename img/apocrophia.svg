<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Apocrophia key art placeholder</title>
  <desc id="desc">Corgi king wearing sunglasses, surrounded by neon biohazard energy for the Apocrophia game.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0aff92" stop-opacity="0.9" />
      <stop offset="50%" stop-color="#0aeb5f" stop-opacity="0.75" />
      <stop offset="100%" stop-color="#032512" stop-opacity="1" />
